# ============================================================
# 热点挖掘器 - Docker Compose 配置
# ============================================================
# 使用方法:
#   1. docker-compose up --build -d
#   2. docker-compose exec app npx drizzle-kit push
#   3. docker-compose exec app npx tsx db/seed.ts
#   4. docker-compose logs -f app

services:
  # ============================================
  # MySQL 数据库
  # ============================================
  mysql:
    image: mysql:8.0
    container_name: hotspot-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-HotPot@2026Secure!}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-hotpot2026}
      MYSQL_USER: ${MYSQL_USER:-hotpot_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-HotPot@2026Secure!}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: always
    networks:
      - hotspot-network

  # ============================================
  # 热点挖掘器应用
  # ============================================
  app:
    build:
      context: ../app
      dockerfile: Dockerfile
    container_name: hotspot-app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql://hotpot_user:HotPot@2026Secure!@mysql:3306/hotpot2026}
      NODE_ENV: production
      PORT: 3000
      APP_ID: ${APP_ID:-hotpot_app_1777004661_5058}
      APP_SECRET: ${APP_SECRET:-ee0b7b8de1052a7d10c05f04af015ba87d1da916aad3a7d88fb2565283c4c7cc}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/trpc/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: always
    networks:
      - hotspot-network

  # ============================================
  # Nginx 反向代理
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: hotspot-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    restart: always
    networks:
      - hotspot-network

# ============================================
# 数据卷
# ============================================
volumes:
  mysql_data:
    driver: local

# ============================================
# 网络
# ============================================
networks:
  hotspot-network:
    driver: bridge
