# 热点挖掘器 - Docker Compose 配置
# 使用方法:
#   1. docker-compose up -d          # 启动所有服务
#   2. docker-compose exec app npx drizzle-kit push  # 推送数据库schema
#   3. docker-compose exec app npx tsx db/seed.ts    # 插入种子数据
#   4. docker-compose logs -f app    # 查看日志

version: '3.8'

services:
  # ============================================
  # MySQL 数据库
  # ============================================
  mysql:
    image: mysql:8.0
    container_name: hotspot-mysql
    environment:
      MYSQL_ROOT_PASSWORD: HotspotDB2024!
      MYSQL_DATABASE: hotspot_db
      MYSQL_USER: hotspot
      MYSQL_PASSWORD: HotspotUser2024!
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pHotspotDB2024!"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always
    networks:
      - hotspot-network

  # ============================================
  # 热点挖掘器应用
  # ============================================
  app:
    build:
      context: ../app
      dockerfile: ../deploy/Dockerfile
    container_name: hotspot-app
    ports:
      - "3000:3000"
    environment:
      # 数据库连接（使用Docker内部网络）
      DATABASE_URL: mysql://hotspot:HotspotUser2024!@mysql:3306/hotspot_db
      NODE_ENV: production
      PORT: 3000
      
      # 采集配置（可选，不填则使用模拟数据）
      # CRAWLER_WEIBO_COOKIE: "你的微博Cookie"
      # CRAWLER_DOUYIN_COOKIE: "你的抖音Cookie"
      # CRAWLER_XHS_COOKIE: "你的小红书Cookie"
      # CRAWLER_WEATHER_API_KEY: "你的和风天气API密钥"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/trpc/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: always
    networks:
      - hotspot-network

  # ============================================
  # Nginx 反向代理
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: hotspot-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
    restart: always
    networks:
      - hotspot-network

# ============================================
# 数据卷
# ============================================
volumes:
  mysql_data:
    driver: local

# ============================================
# 网络
# ============================================
networks:
  hotspot-network:
    driver: bridge
